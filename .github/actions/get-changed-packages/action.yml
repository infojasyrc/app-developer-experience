name: Get changed packages
description: Gets list of all changed packages

outputs:
  changed_packages: 
    description: List of all changed packages space-separated (e.g. "cm-api cm-webapp cm-admin tpl-fastapi-rest")
    value: ${{ steps.changed-packages.outputs.changed_packages }}
  summary: 
    description: Human-readable summary of changed packages (e.g. "conference manager api, conference manager webapp")
    value: ${{ steps.changed-packages.outputs.summary }}
  
runs:
  using: composite
  steps:
    - name: Get changed packages
      id: changed-packages
      shell: bash
      env:
        GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        GITHUB_EVENT_NAME_VAL: ${{ github.event.name }}
      run: ${{ github.action_path }}/get-changed-packages.sh