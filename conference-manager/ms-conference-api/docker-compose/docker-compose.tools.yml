---

services:
  # observability-prometheus
  ob-prometheus:
    container_name: ${COMPOSE_PROJECT_NAME}-ob-prometheus
    image: prom/prometheus
    platform: ${PLATFORM}
    restart: always
    ports:
      - 9090:9090
    volumes:
      - prometheus-data:/prometheus
      - ../tools/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    # extra_hosts:
    #   - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:9090/-/healthy']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # observability-grafana
  ob-grafana:
    container_name: ${COMPOSE_PROJECT_NAME}-ob-grafana
    image: grafana/grafana
    platform: ${PLATFORM}
    restart: always
    ports:
      - 3000:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ../tools/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      ob-prometheus:
        condition: service_healthy

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME}-network

volumes:
  prometheus-data:
    name: ${COMPOSE_PROJECT_NAME}-prometheus-data
  grafana-data:
    name: ${COMPOSE_PROJECT_NAME}-grafana-data